patterns_found:
  - category: architecture
    pattern: Parent aggregator + single Quarkus module
    description: Root project is packaging `pom` and delegates implementation to one module.
    examples:
      - file: pom.xml
        location: pom.xml:7-12
        snippet: "<packaging>pom</packaging> ... <module>lib-logging-quarkus</module>"
    prevalence: common
  - category: structure
    pattern: Interceptor-centered observability pipeline
    description: `@Logged` and `@Rastreado` annotations activate CDI interceptors that wrap business calls.
    examples:
      - file: lib-logging-quarkus/src/main/java/br/com/vsjr/labs/observability/interceptor/LogInterceptor.java
        location: LogInterceptor.java:46-83
        snippet: "@Logged @Interceptor ... @AroundInvoke public Object interceptar(...)"
      - file: lib-logging-quarkus/src/main/java/br/com/vsjr/labs/observability/interceptor/TracingInterceptor.java
        location: TracingInterceptor.java:35-79
        snippet: "@Rastreado @Priority(APPLICATION - 10)"
    prevalence: common
  - category: architecture
    pattern: Chain-of-Responsibility for extensibility
    description: Context and tracing enrichers are CDI-discovered and ordered by priority.
    examples:
      - file: lib-logging-quarkus/src/main/java/br/com/vsjr/labs/observability/context/GerenciadorContextoLog.java
        location: GerenciadorContextoLog.java:85-102
        snippet: "enriquecedores.stream().sorted(...prioridade...)"
      - file: lib-logging-quarkus/src/main/java/br/com/vsjr/labs/observability/tracing/GerenciadorTracing.java
        location: GerenciadorTracing.java:98-101
        snippet: "enriquecedores.stream().sorted(...prioridade...)"
    prevalence: common
  - category: naming
    pattern: Canonical key governance via enum and prefixes
    description: MDC and metric tag keys are centralized in `CamposMdc`; domain detail keys use `detalhe_` prefix.
    examples:
      - file: lib-logging-quarkus/src/main/java/br/com/vsjr/labs/observability/CamposMdc.java
        location: CamposMdc.java:34-105
        snippet: "enum CamposMdc ... public static final String PREFIXO_DETALHE = \"detalhe_\""
      - file: lib-logging-quarkus/src/main/java/br/com/vsjr/labs/observability/dsl/LOG.java
        location: LOG.java:266
        snippet: "MDC.put(CamposMdc.PREFIXO_DETALHE + chave, ...)"
    prevalence: common
  - category: error_handling
    pattern: Fault isolation in observability operations
    description: Metric/tracing failures are caught and downgraded to logs; business exceptions continue propagation.
    examples:
      - file: lib-logging-quarkus/src/main/java/br/com/vsjr/labs/observability/interceptor/LogInterceptor.java
        location: LogInterceptor.java:70-110
        snippet: "catch (Throwable erro) { registrarFalha(...); ... throw excecao; }"
      - file: lib-logging-quarkus/src/test/java/br/com/vsjr/labs/observability/interceptor/LogInterceptorFaultIsolationTest.java
        location: LogInterceptorFaultIsolationTest.java:43-61
        snippet: "assertThrows(NullPointerException.class, ...); assertNotNull(counter)"
    prevalence: common
  - category: security
    pattern: Key-based PII/credential masking
    description: Sensitive keys are replaced before entering logs.
    examples:
      - file: lib-logging-quarkus/src/main/java/br/com/vsjr/labs/observability/security/SanitizadorDados.java
        location: SanitizadorDados.java:21-49
        snippet: "CREDENCIAL -> \"****\"; DADO_PESSOAL -> \"[PROTEGIDO]\""
    prevalence: common
  - category: testing
    pattern: Profile-driven integration tests for metrics toggles
    description: Tests use Quarkus profiles to validate enabled/disabled telemetry behavior.
    examples:
      - file: lib-logging-quarkus/src/test/java/br/com/vsjr/labs/observability/interceptor/MetricsEnabledTestProfile.java
        location: MetricsEnabledTestProfile.java:10-17
        snippet: "getConfigOverrides(): quarkus.micrometer.enabled=true"
      - file: lib-logging-quarkus/src/test/java/br/com/vsjr/labs/observability/interceptor/LogInterceptorMetricsDisabledIntegrationTest.java
        location: LogInterceptorMetricsDisabledIntegrationTest.java:10-21
        snippet: "deveExecutarFluxoSemErroQuandoMetricasEstaoDesabilitadas"
    prevalence: common
