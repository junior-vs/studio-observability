tldr: |
  - Maven parent module (`pom`) aggregates a single Quarkus module (`lib-logging-quarkus`) with observability-focused Java code.
  - Core runtime path is HTTP request filter -> tracing/logging interceptors -> DSL-based structured emission -> OTLP/JSON export.
  - Primary developer loop uses Maven wrapper (`quarkus:dev`, `test`, `package`, native builds) plus infra Docker Compose scripts/docs.
  - Project conventions emphasize Portuguese DSL naming, canonical MDC keys via enum, Chain-of-Responsibility enrichers, and fault isolation for observability paths.
  - Documentation has path/name drift (`containers-dev` and `logging-quarkus`) versus actual `infra/` and `lib-logging-quarkus` structure.
