related_conventions:
  naming_patterns_in_domain: Portuguese-first domain naming (`registrando`, `enriquecer`, `rastrear`) with canonical telemetry keys in camelCase (`traceId`, `applicationName`) and metric names dot-separated (`<app>.metodo.execucao`).
  structure_of_domain: Package split by concern (`annotations`, `dsl`, `context`, `interceptor`, `tracing`, `security`, `filtro`) plus `example` package demonstrating usage patterns.
  error_handling_in_domain: Observability-side exceptions are captured locally and downgraded to WARN/ERROR logs; original business flow is preserved.
  testing_in_domain: Quarkus integration tests validate DSL behavior and metrics contracts, including enabled/disabled profiles and fault-isolation behavior.
  documentation_in_domain: Root and module READMEs define workflows/contracts; infra docs provide operator workflows; `docs/spec` captures metrics design requirements and acceptance criteria.
related_dependencies:
  internal:
    - component: lib-logging-quarkus/src/main/java/br/com/vsjr/labs/example/rest
      relationship_to_domain: Example consumers exercise interceptors and DSL
      direction: inbound
    - component: docs/spec/spec-design-metrics-lib-logging-quarkus.md
      relationship_to_domain: Formal requirements baseline for metrics behavior
      direction: inbound
    - component: infra/*
      relationship_to_domain: Execution environment for validating telemetry exports
      direction: outbound
  external:
    - name: Docker Compose services (Prometheus/Grafana/Elasticsearch/Kibana/Graylog/MongoDB/OTel Collector)
      purpose_for_domain: Local multi-signal observability backend
    - name: OpenTelemetry ecosystem
      purpose_for_domain: Trace/log/metric signal transport and correlation
    - name: Maven Central/Quarkus BOM
      purpose_for_domain: Dependency and plugin resolution

domain_security_considerations:
  sensitive_areas:
    - area: Application log payload details
      location: LOG.java + SanitizadorDados.java
      concern: Sensitive keys are masked by name before MDC/log emission
    - area: Metrics tag cardinality and leakage
      location: docs/spec/spec-design-metrics-lib-logging-quarkus.md
      concern: Spec forbids user/request/entity IDs in metric tags
    - area: Graylog default credentials in infra
      location: infra/docker-compose.yml:84-87
      concern: Static local secrets/default admin credentials present in compose for dev usage
  authentication_patterns_in_domain: Security identity is read from Quarkus `SecurityIdentity` and request `SecurityContext` for `userId`, roles, and `enduser.id` enrichment.
  authorization_patterns_in_domain: Role list enrichment (`usuario.perfis`) is optional and derived from authenticated identity roles.
  data_validation_in_domain: DSL normalizes null/blank text, uses fallback values (`ValoresPadrao`), and sanitizes detail fields by key classification.
testing_patterns:
  framework: JUnit 5 with QuarkusTest
  coverage_areas: [DSL contracts, metrics enabled flow, metrics disabled flow, fault isolation, metrics endpoint exposure]
  test_organization: Package-aligned tests under `src/test/java/br/com/vsjr/labs/observability/{dsl,interceptor}` with profile override class for metrics-on scenarios.
  mock_patterns: [Profile config overrides via QuarkusTestProfile, direct MeterRegistry assertions]
open_questions:
  - question: Should AGENTS guidance treat metric names as app-prefixed (`<application>.metodo.execucao`) or spec-level unprefixed (`metodo.execucao`)?
    context: Runtime code prefixes with `applicationName` in `LogInterceptor.java:99,119`, while spec examples show unprefixed names in multiple sections.
    type: research
    affects: [AGENTS naming/contracts section, test query examples]
  - question: Which path names are canonical for runbooks (`lib-logging-quarkus` vs `logging-quarkus`; `infra/` vs `containers-dev/`)?
    context: Root README references `containers-dev/` and infra docs/scripts reference `logging-quarkus`, while repository layout uses `infra/` and `lib-logging-quarkus`.
    type: research
    affects: [AGENTS workflow commands, onboarding steps]
gaps:
  - area: Documentation path consistency
    description: Root README points to `containers-dev/` quickstart (README.md:219), but actual infra directory is `infra/`.
    impact: research_blocker
    affects: [Developer onboarding instructions]
  - area: Module naming consistency in run commands
    description: Infra docs/scripts use `cd logging-quarkus` (infra/QUICKSTART.md:10, infra/start-observability.ps1:21), but module folder is `lib-logging-quarkus`.
    impact: research_blocker
    affects: [Build/run workflow section for AGENTS.md]

