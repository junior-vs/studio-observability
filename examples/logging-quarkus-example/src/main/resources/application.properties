quarkus.application.name=logging-quarkus-example

# Exemplo local: console legivel e sem dependencia obrigatoria de collector.
quarkus.log.level=INFO
quarkus.log.category."br.com.vsjr.labs".level=DEBUG
quarkus.log.console.enable=true
quarkus.log.console.json=false
quarkus.log.file.enable=false

# O exemplo pode ser executado sem stack OTel local. Ajuste para false ao usar infra/.
quarkus.otel.sdk.disabled=true

# Habilita metricas no exemplo para expor /q/metrics.
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# Reduz ruido de binders que nao fazem parte da demonstracao principal.
quarkus.micrometer.binder.jvm=false
quarkus.micrometer.binder.system=false
