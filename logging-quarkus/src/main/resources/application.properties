# ============================================================================
# APLICAÇÃO
# ============================================================================
quarkus.application.name=lib-full-logging

# ============================================================================
# LOGGING
# ============================================================================
quarkus.log.json=true
quarkus.log.level=INFO
quarkus.log.category."br.com.vsjr.labs".level=DEBUG
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false

# Adicionar campos customizados aos logs JSON
quarkus.log.console.json.additional-field."service.name".value=${quarkus.application.name}
quarkus.log.console.json.additional-field."environment".value=development

# ============================================================================
# OPENTELEMETRY - TRACES E LOGS
# ============================================================================
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.otel.traces.enabled=true
quarkus.otel.logs.enabled=true
quarkus.otel.metrics.enabled=true

# Configuração de amostragem (100% em dev)
quarkus.otel.traces.sampler=always_on

# Propagação de contexto
quarkus.otel.propagators=tracecontext,baggage

# ============================================================================
# MICROMETER E PROMETHEUS - MÉTRICAS
# ============================================================================
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# Binders comuns do Micrometer
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true
quarkus.micrometer.binder.http-server.enabled=true

# ============================================================================
# CONTEXT PROPAGATION
# ============================================================================
quarkus.arc.context-propagation.mdc=true

# ============================================================================
# HEALTH E INFO
# ============================================================================
quarkus.smallrye-health.root-path=/q/health
quarkus.info.path=/q/info

# ============================================================================
# PERFIL DE DESENVOLVIMENTO
# ============================================================================
%dev.quarkus.log.console.json.pretty-print=true
%dev.quarkus.log.category."br.com.vsjr.labs".level=DEBUG

# Desabilita o Dev Service de observabilidade do Quarkus quando usando docker-compose
%dev.quarkus.observability.enabled=false
%dev.quarkus.observability.dev-resources=false

# ============================================================================
# PERFIL DE PRODUÇÃO
# ============================================================================
%prod.quarkus.log.console.json.pretty-print=false
%prod.quarkus.otel.traces.sampler=traceidratio
%prod.quarkus.otel.traces.sampler.arg=0.1