# ============================================================================
# CONFIGURAÇÃO BASE DE TESTES
# ============================================================================

# Desabilita exportação OTel para não exigir coletor externo durante os testes
quarkus.otel.sdk.disabled=true

# Micrometer desabilitado por padrão; habilitar com @TestProfile(MetricsEnabledTestProfile.class)
quarkus.micrometer.enabled=false
quarkus.micrometer.export.prometheus.enabled=false

# Logging nos testes: INFO para biblioteca, WARNING para ruído de framework
quarkus.log.level=WARNING
quarkus.log.category."br.com.vsjr.labs".level=INFO
