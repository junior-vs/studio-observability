# ============================================================================
# APLICAÇÃO
# ============================================================================
quarkus.application.name=lib-full-logging

# ============================================================================
# LOGGING - BASE (padrão para todos os perfis)
# JSON como padrão para todos os ambientes
# ============================================================================
quarkus.log.json=true
quarkus.log.level=INFO
quarkus.log.category."br.com.vsjr.labs".level=DEBUG

# Console: JSON por padrão (fallback sem perfil)
quarkus.log.console.enable=true
quarkus.log.console.json=true

# Arquivo: desabilitado por padrão
quarkus.log.file.enable=false
quarkus.log.file.json=true

# ============================================================================
# OPENTELEMETRY - EXPORTAÇÃO ESTRUTURADA (Grafana / Graylog / Azure)
# Camada independente: envia logs estruturados via OTLP sem afetar console/arquivo
# ============================================================================
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.otel.propagators=tracecontext,baggage
quarkus.otel.traces.sampler=always_on

# ============================================================================
# MICROMETER E PROMETHEUS - MÉTRICAS
# Será implementado futuramente. Mantido desligado por enquanto.
# ============================================================================
quarkus.micrometer.enabled=false
quarkus.micrometer.export.prometheus.enabled=false
quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.jvm=false
quarkus.micrometer.binder.system=false
quarkus.micrometer.binder.http-server.enabled=false

# ============================================================================
# CONTEXT PROPAGATION
# ============================================================================
quarkus.arc.context-propagation.mdc=true

# ============================================================================
# HEALTH E INFO
# ============================================================================
quarkus.smallrye-health.root-path=/q/health
quarkus.info.path=/q/info

# ============================================================================
# PERFIL: DEV
# Console: JSON
# Arquivo: desabilitado
# OTel: habilitado
# ============================================================================

# --- Console DEV ---
%dev.quarkus.log.console.color=true
%dev.quarkus.log.console.json=true

# --- Categoria DEV ---
%dev.quarkus.log.category."br.com.vsjr.labs".level=DEBUG

# --- Arquivo DEV ---
%dev.quarkus.log.file.enable=false

# --- OTel DEV ---
%dev.quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
%dev.quarkus.otel.traces.enabled=true
%dev.quarkus.otel.logs.enabled=true
%dev.quarkus.otel.metrics.enabled=false
%dev.quarkus.observability.enabled=true
%dev.quarkus.observability.dev-resources=false

# ============================================================================
# PERFIL: PROD
# Console: JSON
# Arquivo: JSON + rotação
# OTel: HABILITADO
# ============================================================================

# --- Console PROD ---
%prod.quarkus.log.console.color=false
%prod.quarkus.log.console.json=true

# --- Arquivo PROD ---
%prod.quarkus.log.file.enable=true
%prod.quarkus.log.file.json=true
%prod.quarkus.log.file.path=/var/log/app/application.log
%prod.quarkus.log.file.rotation.max-file-size=50M
%prod.quarkus.log.file.rotation.max-backup-index=10
%prod.quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd
%prod.quarkus.log.file.rotation.rotate-on-boot=true

# --- OTel PROD (exportação estruturada independente do console/arquivo) ---
%prod.quarkus.otel.exporter.otlp.endpoint=http://otel-collector:4317
%prod.quarkus.otel.traces.enabled=true
%prod.quarkus.otel.logs.enabled=true
%prod.quarkus.otel.logs.level=INFO
%prod.quarkus.otel.metrics.enabled=false
%prod.quarkus.otel.traces.sampler=traceidratio
%prod.quarkus.otel.traces.sampler.arg=0.1