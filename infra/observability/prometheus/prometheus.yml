global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'local-dev'
    environment: 'development'

# Alertmanager configuration (opcional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Regras de alerta (opcional)
# rule_files:
#   - "alerts/*.yml"

scrape_configs:
  # Monitoramento do próprio Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Aplicação Quarkus - Métricas
  - job_name: 'quarkus-app'
    metrics_path: '/q/metrics'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'lib-full-logging'
          service: 'logging-quarkus'

  # OpenTelemetry Collector - Métricas
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          application: 'otel-collector'

  # Elasticsearch - Métricas (se habilitado)
  - job_name: 'elasticsearch'
    metrics_path: '/_prometheus/metrics'
    static_configs:
      - targets: ['elasticsearch:9200']
        labels:
          application: 'elasticsearch'

  # Grafana - Métricas
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          application: 'grafana'
