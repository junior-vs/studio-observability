apiVersion: 1

providers:
  # Dashboard padrão para aplicação Quarkus
  - name: 'Quarkus Dashboards'
    orgId: 1
    folder: 'Quarkus'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards

  # Dashboard de infraestrutura
  - name: 'Infrastructure'
    orgId: 1
    folder: 'Infrastructure'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/infrastructure
