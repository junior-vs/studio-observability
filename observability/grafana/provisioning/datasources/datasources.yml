apiVersion: 1

datasources:
  # Prometheus - Métricas
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s

  # Elasticsearch - Logs
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "[logs-*]YYYY.MM.DD"
    jsonData:
      interval: Daily
      timeField: "@timestamp"
      esVersion: "8.0.0"
      logMessageField: message
      logLevelField: level
    editable: true

  # Elasticsearch - Traces OpenTelemetry
  - name: Elasticsearch-Traces
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "otel-traces*"
    jsonData:
      interval: Daily
      timeField: "@timestamp"
      esVersion: "8.0.0"
    editable: true

  # Elasticsearch - Métricas OpenTelemetry
  - name: Elasticsearch-Metrics
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "otel-metrics*"
    jsonData:
      interval: Daily
      timeField: "@timestamp"
      esVersion: "8.0.0"
    editable: true
